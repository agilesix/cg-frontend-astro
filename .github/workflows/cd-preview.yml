name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    name: Deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    # Bind to the `preview` GitHub Environment so `vars` and `secrets`
    # resolve to its overrides where set, falling back to repo-level
    # values otherwise. Configure preview-specific values in repo
    # Settings → Environments → preview.
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_PA_API_URL: ${{ vars.PUBLIC_PA_API_URL }}
          PUBLIC_FEDERAL_API_URL: ${{ vars.PUBLIC_FEDERAL_API_URL }}
          PUBLIC_CA_API_URL: ${{ vars.PUBLIC_CA_API_URL }}
        run: pnpm run build

      - name: Deploy preview Worker
        id: preview
        env:
          FEDERAL_API_TOKEN: ${{ secrets.FEDERAL_API_TOKEN }}
        run: ./scripts/preview-create.sh "pr-${{ github.event.pull_request.number }}"

      - name: Comment preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-deploy
          message: |
            **Preview deployed** for PR #${{ github.event.pull_request.number }}
            🔗 **${{ steps.preview.outputs.url }}**
            Worker: `${{ steps.preview.outputs.worker_name }}`
            Commit: `${{ github.sha }}`

  cleanup:
    name: Clean up preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Delete preview Worker
        run: ./scripts/preview-cleanup.sh "pr-${{ github.event.pull_request.number }}"

      - name: Update comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-deploy
          message: |
            **Preview removed** for PR #${{ github.event.pull_request.number }}
            The preview Worker has been cleaned up.
