name: CD (production)

# pnpm version comes from `package.json`'s `packageManager` field, so
# `pnpm/action-setup` is called without a `version:` input.

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        # Only `PUBLIC_*` vars are inlined into the client bundle by Vite.
        # `FEDERAL_API_URL` / `FEDERAL_API_TOKEN` stay server-only and reach
        # the deployed Worker via `wrangler secret` + Workers vars, not env
        # here.
        env:
          PUBLIC_PA_API_URL: ${{ vars.PUBLIC_PA_API_URL }}
          PUBLIC_FEDERAL_API_URL: ${{ vars.PUBLIC_FEDERAL_API_URL }}
        run: pnpm run build

      - name: Deploy to Cloudflare
        # Uses the Astro Cloudflare adapter's generated Worker bundle. Requires
        # CLOUDFLARE_API_TOKEN (with Workers:Edit permission) and
        # CLOUDFLARE_ACCOUNT_ID as repo secrets.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --config dist/server/wrangler.json

      - name: Summarize
        if: always()
        run: |
          echo "## Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PUBLIC_PA_API_URL: \`${{ vars.PUBLIC_PA_API_URL || '(unset)' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PUBLIC_FEDERAL_API_URL: \`${{ vars.PUBLIC_FEDERAL_API_URL || '(unset)' }}\`" >> "$GITHUB_STEP_SUMMARY"
